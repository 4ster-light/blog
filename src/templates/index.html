{% extends "base.html" %}

{% block content %}
<div class="space-y-8">
    <div class="bg-gruvbox-bg-s dark:bg-gruvbox-bg-s-dark rounded-lg p-6 shadow-md">
        <div class="flex flex-col sm:flex-row items-center sm:space-x-6 space-y-4 sm:space-y-0">
            <img src="{{ url_for('static', filename='images/pfp.jpg') }}" alt="profile picture"
                class="h-20 w-20 rounded-full sm:h-24 sm:w-24">
            <div class="text-center sm:text-left">
                <h1
                    class="text-2xl font-bold text-gruvbox-yellow dark:text-gruvbox-orange-bright hover:text-gruvbox-orange dark:hover:text-gruvbox-yellow-bright transform transition duration-300">
                    <a href="/about">David Vivar Bogónez</a>
                </h1>
                <p class="text-gruvbox-fg dark:text-gruvbox-fg-dark">aka: ✰λster✰</p>
            </div>
        </div>
    </div>

    <h1 class="text-4xl font-bold text-center text-gruvbox-gray dark:text-gruvbox-gray-dark mt-20">Blog Posts</h1>
    <hr class="border-t border-gruvbox-border-light dark:border-gruvbox-border-dark mt-3 mb-5 font-mono">

    <div class="space-y-8">
        {% for post in posts %}
        <a href="{{ url_for('post', slug=post.slug) }}" class="block">
            <article
                class="bg-gruvbox-bg-s dark:bg-gruvbox-bg-s-dark rounded-lg p-4 sm:p-6 shadow-md hover:shadow-lg transform transition duration-300 hover:-translate-y-1 border border-transparent hover:border-gruvbox-border-light dark:hover:border-gruvbox-border-dark">
                <h2
                    class="text-lg sm:text-xl font-bold mb-2 text-gruvbox-yellow dark:text-gruvbox-orange-bright hover:text-gruvbox-orange dark:hover:text-gruvbox-yellow-bright transition-colors duration-300">
                    {{ post.meta.title }}
                </h2>
                <div class="flex flex-col sm:flex-row sm:items-center sm:space-x-3 mb-3 space-y-2 sm:space-y-0">
                    <time class="text-sm font-medium text-gruvbox-fg dark:text-gruvbox-fg-dark"
                        datetime="{{ post.meta.date.strftime('%Y-%m-%d') }}">
                        {{ post.meta.date.strftime('%B %d, %Y') }}
                    </time>
                    <div class="flex flex-wrap gap-1.5">
                        {% for tag in post.meta.tags %}
                        <span
                            class="inline-block bg-gruvbox-green/10 dark:bg-gruvbox-green-bright/10 text-gruvbox-green dark:text-gruvbox-green-bright rounded-full px-2 py-0.5 text-xs font-medium border border-gruvbox-green/20 dark:border-gruvbox-green-bright/20 hover:bg-gruvbox-green hover:text-gruvbox-bg dark:hover:bg-gruvbox-green-bright dark:hover:text-gruvbox-bg-dark transition-all duration-300 shadow-sm hover:shadow-md">
                            {{ tag }}
                        </span>
                        {% endfor %}
                    </div>
                </div>
                <p class="text-gruvbox-fg dark:text-gruvbox-fg-dark leading-relaxed text-sm">
                    {{ post.meta.description }}
                </p>
            </article>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
